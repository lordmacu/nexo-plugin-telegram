# Tag push (`v0.1.4`, …) builds release binaries for every target the
# `nexo-rs` daemon ships for and creates a GitHub Release in the layout
# `nexo plugin install` expects:
#   * bare `nexo-plugin.toml` at release root
#   * `<plugin_id>-<version>-<target>.tar.gz` containing
#     `nexo-plugin.toml` + `bin/<plugin_id>` at archive root
#   * `<...>.tar.gz.sha256` sidecar with the hex digest
#
# Targets: x86_64/aarch64 musl static + x86_64/aarch64 macOS (via
# cargo-zigbuild) + x86_64 Windows MSVC (native build on windows-latest).
# Operators run `nexo plugin install lordmacu/nexo-plugin-telegram`.

name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - os: macos-14
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: nexo-rs-plugin-telegram
      - name: Checkout proyecto (path-dep workspace)
        uses: actions/checkout@v4
        with:
          repository: lordmacu/nexo-rs
          path: proyecto
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (ring's cc-rs build.rs needs *-linux-musl-gcc)
        if: contains(matrix.target, 'linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: CFLAGS for sqlite-vec on musl (BSD u_intN_t typedefs)
        if: contains(matrix.target, 'linux-musl')
        run: |
          MUSL_CFLAGS='-Du_int8_t=uint8_t -Du_int16_t=uint16_t -Du_int64_t=uint64_t'
          echo "CFLAGS_x86_64_unknown_linux_musl=${MUSL_CFLAGS}"  >> "$GITHUB_ENV"
          echo "CFLAGS_aarch64_unknown_linux_musl=${MUSL_CFLAGS}" >> "$GITHUB_ENV"

      - name: Install zig (pinned)
        if: ${{ !contains(matrix.target, 'windows') }}
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.13.0"
      - name: Install cargo-zigbuild
        if: ${{ !contains(matrix.target, 'windows') }}
        run: cargo install cargo-zigbuild --locked --version 0.22.3

      - name: Build (Unix — cargo-zigbuild)
        if: ${{ !contains(matrix.target, 'windows') }}
        working-directory: nexo-rs-plugin-telegram
        run: cargo zigbuild --release --target ${{ matrix.target }}
      - name: Build (Windows — native cargo)
        if: contains(matrix.target, 'windows')
        working-directory: nexo-rs-plugin-telegram
        run: cargo build --release --target ${{ matrix.target }}

      - name: package (nexo plugin install layout)
        working-directory: nexo-rs-plugin-telegram
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/staging/bin
          BIN="target/${{ matrix.target }}/release/nexo-plugin-telegram"
          [ -f "${BIN}.exe" ] && BIN="${BIN}.exe"
          cp "$BIN" dist/staging/bin/telegram
          cp nexo-plugin.toml dist/staging/nexo-plugin.toml

          PLUGIN_ID=$(grep -E '^id[[:space:]]*=' nexo-plugin.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION=$(grep -E '^version[[:space:]]*=' nexo-plugin.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          TARBALL="${PLUGIN_ID}-${VERSION}-${{ matrix.target }}.tar.gz"

          tar czf "dist/${TARBALL}" -C dist/staging bin/telegram nexo-plugin.toml
          { sha256sum "dist/${TARBALL}" 2>/dev/null || shasum -a 256 "dist/${TARBALL}"; } | awk '{print $1}' > "dist/${TARBALL}.sha256"
          cp nexo-plugin.toml dist/nexo-plugin.toml
          ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: |
            nexo-rs-plugin-telegram/dist/*.tar.gz
            nexo-rs-plugin-telegram/dist/*.tar.gz.sha256
            nexo-rs-plugin-telegram/dist/nexo-plugin.toml

  release:
    name: github release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.tar.gz.sha256
            dist/**/nexo-plugin.toml
          generate_release_notes: true
